<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none" role="img" aria-labelledby="title description">
  <title id="title">AgentsKit Registry deterministic-first discovery</title>
  <desc id="description">Validated agents feed a local deterministic knowledge layer. Exact questions return instantly without a backend call, while semantic questions escalate with grounded context to AgentsChat.</desc>
  <defs>
    <linearGradient id="bg" x1="70" y1="30" x2="1130" y2="600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#0D1117"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#58A6FF"/>
      <stop offset="0.5" stop-color="#A371F7"/>
      <stop offset="1" stop-color="#F778BA"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000" flood-opacity="0.32"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0 0L8 4L0 8V0Z" fill="#58A6FF"/>
    </marker>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    </style>
  </defs>

  <rect width="1200" height="630" rx="32" fill="url(#bg)"/>
  <circle cx="1080" cy="-20" r="250" fill="#58A6FF" opacity="0.08"/>
  <circle cx="40" cy="650" r="270" fill="#A371F7" opacity="0.08"/>

  <g transform="translate(56 42)">
    <g stroke-width="2" stroke-linecap="round">
      <line x1="9" y1="42" x2="30" y2="7" stroke="#58A6FF"/>
      <line x1="30" y1="7" x2="51" y2="42" stroke="#A371F7"/>
      <line x1="9" y1="42" x2="51" y2="42" stroke="#F778BA"/>
    </g>
    <circle cx="30" cy="7" r="5" fill="#58A6FF"/>
    <circle cx="9" cy="42" r="5" fill="#A371F7"/>
    <circle cx="51" cy="42" r="5" fill="#F778BA"/>
    <text x="72" y="25" fill="#E6EDF3" font-size="25" font-weight="750" class="sans">AgentsKit Registry</text>
    <text x="72" y="47" fill="#8B949E" font-size="13" letter-spacing="1.8" class="mono">DETERMINISTIC FIRST · BACKEND WHEN NEEDED</text>
  </g>

  <g transform="translate(56 126)" class="sans">
    <rect width="216" height="38" rx="19" fill="#162536" stroke="#2B5279"/>
    <circle cx="20" cy="19" r="5" fill="#58A6FF"/>
    <text x="34" y="24" fill="#C9D1D9" font-size="14" font-weight="650">346 validated agents</text>
    <rect x="228" width="250" height="38" rx="19" fill="#211C34" stroke="#55437E"/>
    <circle cx="248" cy="19" r="5" fill="#A371F7"/>
    <text x="262" y="24" fill="#C9D1D9" font-size="14" font-weight="650">333 independently reviewed</text>
    <rect x="490" width="174" height="38" rx="19" fill="#2A1B2A" stroke="#714165"/>
    <circle cx="510" cy="19" r="5" fill="#F778BA"/>
    <text x="524" y="24" fill="#C9D1D9" font-size="14" font-weight="650">23 categories</text>
  </g>

  <g filter="url(#shadow)" class="sans">
    <rect x="56" y="200" width="300" height="220" rx="20" fill="#161B22" stroke="#30363D"/>
    <text x="82" y="235" fill="#8B949E" font-size="12" font-weight="700" letter-spacing="1.5">SOURCE OF TRUTH</text>
    <text x="82" y="273" fill="#E6EDF3" font-size="23" font-weight="750">Validated bundles</text>
    <text x="82" y="303" fill="#8B949E" font-size="15">agent.ts · meta.json</text>
    <text x="82" y="327" fill="#8B949E" font-size="15">tests · README · evidence</text>
    <rect x="82" y="351" width="118" height="40" rx="10" fill="#0D1117" stroke="#30363D"/>
    <text x="99" y="376" fill="#58A6FF" font-size="13" class="mono">npm validate</text>
    <path d="M326 225V390" stroke="url(#brand)" stroke-width="3" stroke-linecap="round" opacity="0.7"/>

    <rect x="450" y="200" width="300" height="220" rx="20" fill="#161B22" stroke="#365F86"/>
    <text x="476" y="235" fill="#58A6FF" font-size="12" font-weight="700" letter-spacing="1.5">LOCAL KNOWLEDGE</text>
    <text x="476" y="273" fill="#E6EDF3" font-size="23" font-weight="750">Deterministic match</text>
    <text x="476" y="303" fill="#8B949E" font-size="15">IDs · install commands</text>
    <text x="476" y="327" fill="#8B949E" font-size="15">categories · capabilities</text>
    <rect x="476" y="351" width="188" height="40" rx="10" fill="#112436" stroke="#2B5279"/>
    <text x="493" y="376" fill="#79C0FF" font-size="13" class="mono">0 backend calls</text>

    <rect x="844" y="200" width="300" height="220" rx="20" fill="#161B22" stroke="#30363D"/>
    <text x="870" y="235" fill="#8B949E" font-size="12" font-weight="700" letter-spacing="1.5">CONSUMERS</text>
    <text x="870" y="273" fill="#E6EDF3" font-size="23" font-weight="750">Ready to use</text>
    <text x="870" y="305" fill="#8B949E" font-size="15">Fumadocs · llms.txt</text>
    <text x="870" y="329" fill="#8B949E" font-size="15">CLI · agents · humans</text>
    <rect x="870" y="351" width="210" height="40" rx="10" fill="#0D1117" stroke="#30363D"/>
    <text x="887" y="376" fill="#E6EDF3" font-size="13" class="mono">npx agentskit add</text>
  </g>

  <path d="M368 310H432" stroke="#58A6FF" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M762 310H826" stroke="#58A6FF" stroke-width="2" marker-end="url(#arrow)"/>

  <g transform="translate(56 466)" class="sans">
    <rect width="1088" height="112" rx="18" fill="#121820" stroke="#30363D"/>
    <circle cx="34" cy="34" r="12" fill="#A371F7" opacity="0.2"/>
    <path d="M29 34H39M34 29V39" stroke="#C9A7FF" stroke-width="2" stroke-linecap="round"/>
    <text x="58" y="31" fill="#E6EDF3" font-size="17" font-weight="700">Semantic or ambiguous question?</text>
    <text x="58" y="56" fill="#8B949E" font-size="14">Preserve the deterministic handoff and escalate once with bounded, cited context.</text>
    <rect x="750" y="24" width="306" height="58" rx="14" fill="#211C34" stroke="#55437E"/>
    <text x="774" y="48" fill="#C9A7FF" font-size="12" font-weight="700" letter-spacing="1.2">AGENTSCHAT BACKEND</text>
    <text x="774" y="69" fill="#C9D1D9" font-size="14" class="mono">grounded · only when needed</text>
    <path d="M690 53H730" stroke="#A371F7" stroke-width="2" marker-end="url(#arrow)"/>
  </g>

  <rect x="56" y="600" width="1088" height="2" rx="1" fill="url(#brand)" opacity="0.55"/>
</svg>

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - name: Committed index (public/r) is up to date
        run: git diff --exit-code public/r || (echo "public/r is stale — run 'npm run build' and commit." && exit 1)

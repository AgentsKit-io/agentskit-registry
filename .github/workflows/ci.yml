name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Generate Doc Bridge ownership for every agent
        run: npm run docs:bridge:config
      - name: Validate agent structure (CONTRIBUTING bar)
        run: npm run validate
      - run: npm run lint
      - run: npm test
      - run: npm run test:quickstart
      - name: Eval replay (doc-bridge pack)
        run: npm run eval:run -- --ecosystem-doc-bridge
      - run: npm run build
      - run: npm run docs:bridge:index
      - run: npm run docs:bridge:gate
      - run: npm run docs:bridge:conformance
      - name: Committed machine artifacts and handoffs are up to date
        run: git diff --exit-code public ecosystem-claims.json doc-bridge.config.json .doc-bridge || (echo "Generated Registry artifacts are stale — regenerate and commit them." && exit 1)
